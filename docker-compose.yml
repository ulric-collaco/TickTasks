services:
  backend:
    build: ./backend
    environment:
      PORT: 3001
      CORS_ORIGIN: http://localhost:5173
      STORE_FILE: /app/data/tasks.json
    ports:
      - "3001:3001"
    volumes:
      - backend_data:/app/data

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:3001
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend_data:
